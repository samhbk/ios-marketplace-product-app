name: IOSMarketplaceProductApp
options:
  bundleIdPrefix: com.marketplace
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_CFBundleDisplayName: Marketplace
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0.0"
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: 5.9.0
schemes:
  IOSMarketplaceProductApp:
    build:
      targets:
        IOSMarketplaceProductApp: all
    test:
      targets:
        - IOSMarketplaceProductAppTests
    environmentVariables:
      MARKETPLACE_API_BASE_URL: http://127.0.0.1:8000
targets:
  IOSMarketplaceProductApp:
    type: application
    platform: iOS
    sources:
      - path: IOSMarketplaceProductApp
    dependencies:
      - package: Alamofire
    info:
      path: IOSMarketplaceProductApp/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marketplace.app
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
  IOSMarketplaceProductAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IOSMarketplaceProductAppTests
    dependencies:
      - target: IOSMarketplaceProductApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.marketplace.app.tests
