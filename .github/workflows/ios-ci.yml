name: iOS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project IOSMarketplaceProductApp.xcodeproj \
            -scheme IOSMarketplaceProductApp

      - name: Resolve simulator destination
        id: sim
        run: |
          DEVICE="iPhone 16"
          OS_VERSION=$(xcrun simctl list runtimes available -j \
            | python3 -c "import json,sys; r=json.load(sys.stdin)['runtimes']; ios=sorted([x for x in r if x['isAvailable'] and x['identifier'].startswith('com.apple.CoreSimulator.SimRuntime.iOS')], key=lambda x: x['version'], reverse=True); print(ios[0]['version'].split('-')[0] if ios else '18.0')")
          echo "destination=platform=iOS Simulator,name=$DEVICE,OS=$OS_VERSION" >> "$GITHUB_OUTPUT"
          echo "Using destination: platform=iOS Simulator,name=$DEVICE,OS=$OS_VERSION"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project IOSMarketplaceProductApp.xcodeproj \
            -scheme IOSMarketplaceProductApp \
            -destination '${{ steps.sim.outputs.destination }}' \
            CODE_SIGNING_ALLOWED=NO \
            | tee build.log

      - name: Unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project IOSMarketplaceProductApp.xcodeproj \
            -scheme IOSMarketplaceProductApp \
            -destination '${{ steps.sim.outputs.destination }}' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | tee test.log

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: |
            TestResults.xcresult
            build.log
            test.log
          if-no-files-found: ignore
